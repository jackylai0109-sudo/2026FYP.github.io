        window.getCurrentLocationAndCenter = function() {
            if (!map) {
                alert('地圖尚未初始化完成，請稍後再試');
                return;
            }
            
            if (!navigator.geolocation) {
                alert('您的瀏覽器不支援地理位置功能');
                return;
            }

            const loadingEl = document.getElementById('locationLoading');
            const locationInfo = document.getElementById('locationInfo');
            
            if (loadingEl) loadingEl.style.display = 'block';

            navigator.geolocation.getCurrentPosition(
                function(position) {
                    const currentPos = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude,
                        accuracy: position.coords.accuracy
                    };
                    
                    currentUserLocation = currentPos;
                    lastOriginPosition = currentPos;
                    
                    map.setCenter(currentPos);
                    map.setZoom(17);
                    
                    if (currentLocationMarker) currentLocationMarker.setMap(null);
                    if (userLocationCircle) userLocationCircle.setMap(null);
                    
                    const user = auth.currentUser;
                    
                    if (user) {
                        db.collection('users').doc(user.uid).get().then((doc) => {
                            let avatarUrl = null;
                            let username = user.displayName || user.email?.split('@')[0] || '用戶';
                            
                            if (doc.exists) {
                                if (doc.data().profileImageUrl) {
                                    avatarUrl = doc.data().profileImageUrl;
                                }
                                if (doc.data().username) {
                                    username = doc.data().username;
                                }
                            }
                            
                            createCustomAvatarMarker(currentPos, avatarUrl, position.coords.accuracy, username);
                            
                            if (isSharingLocation) {
                                shareCurrentLocation();
                            }
                        }).catch((error) => {
                            console.error('獲取用戶資料錯誤:', error);
                            createCustomAvatarMarker(currentPos, null, position.coords.accuracy, '用戶');
                        });
                    } else {
                        createCustomAvatarMarker(currentPos, null, position.coords.accuracy, '訪客');
                    }
                    
                    if (locationInfo) {
                        locationInfo.textContent = `📍 您的位置 - 精確度：約 ${Math.round(position.coords.accuracy)} 公尺`;
                        locationInfo.style.display = 'block';
                        setTimeout(() => locationInfo.style.display = 'none', 5000);
                    }
                    
                    if (loadingEl) loadingEl.style.display = 'none';

                    if (currentDestinationPosition) {
                        calculateAndDisplayRoute(currentPos, currentDestinationPosition, currentTravelMode);
                    } else {
                        const infoWindow = new google.maps.InfoWindow({
                            content: '<div style="padding:8px;">🔍 現在可以搜尋目的地，路線會自動規劃</div>'
                        });
                        infoWindow.setPosition(currentPos);
                        infoWindow.open(map);
                    }
                },
                
                function(error) {
                    console.error('地理位置錯誤:', error);
                    if (loadingEl) loadingEl.style.display = 'none';
                    
                    let errorMessage = '無法獲取您的位置：';
                    switch(error.code) {
                        case error.PERMISSION_DENIED:
                            errorMessage += '您拒絕了位置存取權限。';
                            break;
                        case error.POSITION_UNAVAILABLE:
                            errorMessage += '位置資訊不可用。';
                            break;
                        case error.TIMEOUT:
                            errorMessage += '擷取位置超時。';
                            break;
                        default:
                            errorMessage += '未知錯誤。';
                    }
                    alert(errorMessage);
                },
                {
                    enableHighAccuracy: true,
                    timeout: 15000,
                    maximumAge: 0
                }
            );
        };

        window.searchNearby = function(type) {
            if (!map || !placesService) {
                alert('地圖尚未準備好，請稍後再試');
                return;
            }

            clearNearbyMarkers();

            const btn = document.getElementById(getButtonId(type));
            if (btn) btn.classList.add('active');

            let searchCenter;
            if (searchLocationType === 'current') {
                if (!currentUserLocation) {
                    showToast('請先點擊定位按鈕獲取您的位置');
                    return;
                }
                searchCenter = {
                    lat: currentUserLocation.lat,
                    lng: currentUserLocation.lng
                };
            } else {
                const center = map.getCenter();
                searchCenter = {
                    lat: center.lat(),
                    lng: center.lng()
                };
            }

            const typeNames = {
                'restaurant': { name: '餐廳', icon: '🍽️' },
                'hotel': { name: '酒店', icon: '🏨' },
                'convenience_store': { name: '便利店', icon: '🏪' },
                'cafe': { name: '咖啡廳', icon: '☕' },
                'gas_station': { name: '加油站', icon: '⛽' },
                'parking': { name: '停車場', icon: '🅿️' },
                'hospital': { name: '醫院', icon: '🏥' },
                'atm': { name: '提款機', icon: '🏧' }
            };

            showToast(`正在搜尋 ${searchLocationType === 'current' ? '您附近' : '地圖中心附近'} 1公里內的${typeNames[type].name}...`);

            const request = {
                location: new google.maps.LatLng(searchCenter.lat, searchCenter.lng),
                radius: 1000,
                type: type
            };

            placesService.nearbySearch(request, (results, status) => {
                if (status === google.maps.places.PlacesServiceStatus.OK && results && results.length > 0) {
                    
                    const sortedResults = results.sort((a, b) => {
                        const distA = google.maps.geometry.spherical.computeDistanceBetween(
                            new google.maps.LatLng(searchCenter.lat, searchCenter.lng), 
                            a.geometry.location
                        );
                        const distB = google.maps.geometry.spherical.computeDistanceBetween(
                            new google.maps.LatLng(searchCenter.lat, searchCenter.lng), 
                            b.geometry.location
                        );
                        return distA - distB;
                    });

                    const oneKmResults = sortedResults.filter(place => {
                        const distance = google.maps.geometry.spherical.computeDistanceBetween(
                            new google.maps.LatLng(searchCenter.lat, searchCenter.lng), 
                            place.geometry.location
                        );
                        return distance <= 1000;
                    });

                    if (oneKmResults.length === 0) {
                        showToast(`${searchLocationType === 'current' ? '您附近' : '地圖中心附近'} 1公里內找不到${typeNames[type].name}`);
                        return;
                    }

                    const top20Results = oneKmResults.slice(0, 20);

                    showToast(`在1公里內找到 ${top20Results.length} 間${typeNames[type].name}`);

                    top20Results.forEach((place) => {
                        createNearbyMarker(place, typeNames[type], searchCenter);
                    });

                    if (top20Results.length > 0) {
                        const bounds = new google.maps.LatLngBounds();
                        top20Results.forEach(place => {
                            bounds.extend(place.geometry.location);
                        });
                        
                        if (top20Results.length === 1) {
                            map.setCenter(top20Results[0].geometry.location);
                            map.setZoom(16);
                        } else {
                            map.fitBounds(bounds);
                            
                            const listener = google.maps.event.addListener(map, 'bounds_changed', function() {
                                if (map.getZoom() > 18) map.setZoom(18);
                                google.maps.event.removeListener(listener);
                            });
                        }
                    }
                } else if (status === google.maps.places.PlacesServiceStatus.ZERO_RESULTS) {
                    showToast(`${searchLocationType === 'current' ? '您附近' : '地圖中心附近'} 1公里內找不到${typeNames[type].name}`);
                } else {
                    console.error('附近搜尋失敗:', status);
                    let errorMsg = '搜尋失敗';
                    switch(status) {
                        case 'OVER_QUERY_LIMIT':
                            errorMsg = '查詢次數超過限制，請稍後再試';
                            break;
                        case 'REQUEST_DENIED':
                            errorMsg = '請求被拒絕';
                            break;
                        case 'INVALID_REQUEST':
                            errorMsg = '無效的請求';
                            break;
                        default:
                            errorMsg = `搜尋失敗：${status}`;
                    }
                    showToast(errorMsg);
                }
            });
        };

        function createNearbyMarker(place, typeInfo, center) {
            let distanceText = '';
            let distance = 0;
            
            if (center) {
                distance = google.maps.geometry.spherical.computeDistanceBetween(
                    new google.maps.LatLng(center.lat, center.lng), 
                    place.geometry.location
                );
                if (distance < 1000) {
                    distanceText = `<div style="font-size: 11px; color: var(--muted); margin-bottom: 5px;">📏 距離 ${Math.round(distance)} 公尺</div>`;
                } else {
                    distanceText = `<div style="font-size: 11px; color: var(--muted); margin-bottom: 5px;">📏 距離 ${(distance/1000).toFixed(1)} 公里</div>`;
                }
            }

            const markerColors = {
                'restaurant': '#FF6B6B',
                'hotel': '#4ECDC4',
                'convenience_store': '#45B7D1',
                'cafe': '#FFB347',
                'gas_station': '#96CEB4',
                'parking': '#FFE194',
                'hospital': '#DDA0DD',
                'atm': '#FF9999'
            };

            let colorKey = 'restaurant';
            if (typeInfo.icon === '🏨') colorKey = 'hotel';
            else if (typeInfo.icon === '🏪') colorKey = 'convenience_store';
            else if (typeInfo.icon === '☕') colorKey = 'cafe';
            else if (typeInfo.icon === '⛽') colorKey = 'gas_station';
            else if (typeInfo.icon === '🅿️') colorKey = 'parking';
            else if (typeInfo.icon === '🏥') colorKey = 'hospital';
            else if (typeInfo.icon === '🏧') colorKey = 'atm';

            const marker = new google.maps.Marker({
                map: map,
                position: place.geometry.location,
                title: place.name,
                icon: {
                    path: google.maps.SymbolPath.CIRCLE,
                    scale: 10,
                    fillColor: markerColors[colorKey],
                    fillOpacity: 0.9,
                    strokeColor: 'white',
                    strokeWeight: 2
                },
                animation: google.maps.Animation.DROP
            });

            marker.addListener('click', () => {
                if (currentInfoWindow) {
                    currentInfoWindow.close();
                }

                const infoWindowContent = `
                    <div class="info-window" style="max-width: 250px;">
                        <div class="info-window-title" style="font-size: 16px; margin-bottom: 8px;">${typeInfo.icon} ${place.name}</div>
                        ${distanceText}
                        <div class="info-window-address" style="font-size: 11px; margin: 8px 0;">📍 ${place.vicinity || '地址不詳'}</div>
                        <button class="info-window-btn" onclick="setDestination(${place.geometry.location.lat()}, ${place.geometry.location.lng()}, '${place.name.replace(/'/g, "\\'")}')">
                            設為目的地
                        </button>
                    </div>
                `;

                const infoWindow = new google.maps.InfoWindow({
                    content: infoWindowContent
                });

                infoWindow.open(map, marker);
                currentInfoWindow = infoWindow;
            });

            nearbyMarkers.push(marker);
        }

        function getButtonId(type) {
            const map = {
                'restaurant': 'btnRestaurant',
                'hotel': 'btnHotel',
                'convenience_store': 'btnStore',
                'cafe': 'btnCafe',
                'gas_station': 'btnGas',
                'parking': 'btnParking',
                'hospital': 'btnHospital',
                'atm': 'btnATM'
            };
            return map[type] || '';
        }

        window.setDestination = function(lat, lng, name) {
            currentDestinationPosition = { lat, lng };
            
            clearNearbyMarkers();
            
            map.setCenter({ lat, lng });
            map.setZoom(17);
            
            if (searchMarker) {
                searchMarker.setMap(null);
            }
            
            searchMarker = new google.maps.Marker({
                map: map,
                position: { lat, lng },
                title: name,
                animation: google.maps.Animation.DROP
            });
            
            const infoWindow = new google.maps.InfoWindow({
                content: `
                    <div class="info-window">
                        <div class="info-window-title">📍 目的地</div>
                        <div class="info-window-address">${name}</div>
                        <small style="color:var(--accent);">✅ 已設為目的地，選擇交通模式規劃路線</small>
                    </div>
                `
            });
            
            infoWindow.open(map, searchMarker);
            
            if (lastOriginPosition) {
                calculateAndDisplayRoute(lastOriginPosition, currentDestinationPosition, currentTravelMode);
            }

            if (currentInfoWindow) {
                currentInfoWindow.close();
            }
        };

        function handlePlaceSelected(place) {
            if (!map) {
                alert('地圖尚未初始化完成，請稍後再試');
                return;
            }
            
            const position = place.geometry.location;
            
            currentDestinationPosition = {
                lat: position.lat(),
                lng: position.lng()
            };
            
            map.setCenter(position);
            map.setZoom(17);
            
            if (searchMarker) {
                searchMarker.setMap(null);
            }
            
            searchMarker = new google.maps.Marker({
                map: map,
                position: position,
                title: place.name,
                animation: google.maps.Animation.DROP
            });
            
            const infoWindow = new google.maps.InfoWindow({
                content: `
                    <div class="info-window">
                        <div class="info-window-title">${place.name}</div>
                        <div class="info-window-address">${place.formatted_address || ''}</div>
                        <small style="color:var(--accent);">✅ 選擇交通模式自動規劃路線</small>
                    </div>
                `
            });
            
            infoWindow.open(map, searchMarker);
            currentInfoWindow = infoWindow;

            if (directionsRenderer) directionsRenderer.setDirections({ routes: [] });
            document.getElementById('routeSummary').classList.remove('show');
            
            if (lastOriginPosition) {
                autoPlanRoute();
            }

            clearNearbyMarkers();
        }

        window.searchPlace = function() {
            if (!map || !placesService) {
                alert('地圖尚未準備好，請稍後再試');
                return;
            }
            
            const query = document.getElementById('searchInput').value.trim();
            if (!query) return;

            const request = {
                query: query,
                fields: ['name', 'geometry', 'formatted_address']
            };

            placesService.findPlaceFromQuery(request, (results, status) => {
                if (status === google.maps.places.PlacesServiceStatus.OK && results.length > 0) {
                    const place = results[0];
                    const position = place.geometry.location;
                    
                    currentDestinationPosition = {
                        lat: position.lat(),
                        lng: position.lng()
                    };
                    
                    map.setCenter(position);
                    map.setZoom(17);
                    
                    if (searchMarker) searchMarker.setMap(null);
                    
                    searchMarker = new google.maps.Marker({
                        map: map,
                        position: position,
                        title: place.name,
                        animation: google.maps.Animation.DROP
                    });
                    
                    const infoWindow = new google.maps.InfoWindow({
                        content: `
                            <div class="info-window">
                                <div class="info-window-title">${place.name}</div>
                                <div class="info-window-address">${place.formatted_address || ''}</div>
                                <small style="color:var(--accent);">✅ 選擇交通模式自動規劃路線</small>
                            </div>
                        `
                    });
                    infoWindow.open(map, searchMarker);
                    currentInfoWindow = infoWindow;
                    
                    if (directionsRenderer) directionsRenderer.setDirections({ routes: [] });
                    document.getElementById('routeSummary').classList.remove('show');
                    
                    if (lastOriginPosition) {
                        autoPlanRoute();
                    }

                    clearNearbyMarkers();
                } else {
                    alert('找不到該地點，請嘗試其他關鍵字');
                }
            });
        };

        function autoPlanRoute() {
            if (lastOriginPosition && currentDestinationPosition) {
                calculateAndDisplayRoute(lastOriginPosition, currentDestinationPosition, currentTravelMode);
            }
        }

        window.setTravelMode = function(mode) {
            document.querySelectorAll('.route-mode-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`.route-mode-btn[data-mode="${mode}"]`).classList.add('active');
            
            currentTravelMode = mode;
            
            if (lastOriginPosition && currentDestinationPosition) {
                calculateAndDisplayRoute(lastOriginPosition, currentDestinationPosition, mode);
            } else if (!lastOriginPosition) {
                if (map) {
                    const infoWindow = new google.maps.InfoWindow({
                        content: '<div style="padding:8px;">📍 請先點擊左下角按鈕獲取您的位置</div>'
                    });
                    infoWindow.setPosition(map.getCenter());
                    infoWindow.open(map);
                }
            } else if (!currentDestinationPosition) {
                if (map) {
                    const infoWindow = new google.maps.InfoWindow({
                        content: '<div style="padding:8px;">🔍 請先搜尋目的地</div>'
                    });
                    infoWindow.setPosition(map.getCenter());
                    infoWindow.open(map);
                }
            }
        };

        function getGoogleTravelMode(mode) {
            switch(mode) {
                case 'DRIVING': 
                    return google.maps.TravelMode.DRIVING;
                case 'TRANSIT': 
                    return google.maps.TravelMode.TRANSIT;
                case 'WALKING': 
                    return google.maps.TravelMode.WALKING;
                default: 
                    return google.maps.TravelMode.DRIVING;
            }
        }

        function calculateAndDisplayRoute(origin, destination, mode) {
            if (!directionsService || !directionsRenderer) return;

            const travelMode = getGoogleTravelMode(mode);

            const request = {
                origin: origin,
                destination: destination,
                travelMode: travelMode,
                unitSystem: google.maps.UnitSystem.METRIC
            };

            if (mode === 'TRANSIT') {
                request.transitOptions = {
                    modes: [google.maps.TransitMode.BUS, google.maps.TransitMode.RAIL],
                    routingPreference: google.maps.TransitRoutePreference.FEWER_TRANSFERS
                };
            }

            console.log('路線請求:', mode, request);

            directionsService.route(request, (result, status) => {
                console.log('路線規劃結果:', status);
                
                if (status === google.maps.DirectionsStatus.OK) {
                    directionsRenderer.setDirections(result);
                    
                    const route = result.routes[0];
                    if (route && route.legs.length > 0) {
                        const leg = route.legs[0];
                        const distance = leg.distance.text;
                        const duration = leg.duration.text;
                        
                        let modeIcon = '🚗';
                        let modeName = '開車';
                        if (mode === 'TRANSIT') {
                            modeIcon = '🚆';
                            modeName = '大眾運輸';
                        } else if (mode === 'WALKING') {
                            modeIcon = '🚶';
                            modeName = '步行';
                        }
                        
                        let summaryHtml = `
                            <strong>${modeIcon} 最佳路線 (${modeName})</strong><br>
                            <span>距離: ${distance} | 時間: ${duration}</span><br>
                            <small>起點: ${leg.start_address.split(',')[0]}</small><br>
                            <small>終點: ${leg.end_address.split(',')[0]}</small>
                        `;
                        document.getElementById('routeSummaryContent').innerHTML = summaryHtml;

                        if (mode === 'TRANSIT' && leg.steps) {
                            let transitStepsHtml = '<hr style="margin:8px 0"><strong>🚉 轉乘資訊</strong>';
                            leg.steps.forEach((step) => {
                                if (step.travel_mode === 'TRANSIT' && step.transit) {
                                    const line = step.transit.line;
                                    const vehicle = line.vehicle;
                                    const icon = vehicle && vehicle.type === 'BUS' ? '🚌' : '🚆';
                                    const departureStop = step.transit.departure_stop.name;
                                    const arrivalStop = step.transit.arrival_stop.name;
                                    transitStepsHtml += `
                                        <div class="transit-step">
                                            <span>${icon} ${line.short_name || line.name || ''}</span>
                                            <span>${departureStop} → ${arrivalStop}</span>
                                            <small>(${step.duration.text})</small>
                                        </div>
                                    `;
                                } else if (step.travel_mode === 'WALKING') {
                                    transitStepsHtml += `<div class="transit-step"><span>🚶 步行 ${step.distance.text} (${step.duration.text})</span></div>`;
                                }
                            });
                            document.getElementById('transitDetailed').innerHTML = transitStepsHtml;
                        } else {
                            document.getElementById('transitDetailed').innerHTML = '';
                        }

                        document.getElementById('routeSummary').classList.add('show');
                    }
                } else {
                    console.log('路線規劃失敗:', status);
                    
                    let errorMessage = '路線規劃失敗';
                    switch(status) {
                        case google.maps.DirectionsStatus.NOT_FOUND:
                            errorMessage = '找不到路線，請檢查起點和終點是否有效';
                            break;
                        case google.maps.DirectionsStatus.ZERO_RESULTS:
                            errorMessage = '找不到符合條件的路線，請嘗試其他交通方式';
                            break;
                        case google.maps.DirectionsStatus.MAX_WAYPOINTS_EXCEEDED:
                            errorMessage = '超過路線點數限制';
                            break;
                        case google.maps.DirectionsStatus.INVALID_REQUEST:
                            errorMessage = '無效的請求參數';
                            break;
                        case google.maps.DirectionsStatus.OVER_QUERY_LIMIT:
                            errorMessage = '超過查詢次數限制，請稍後再試';
                            break;
                        case google.maps.DirectionsStatus.REQUEST_DENIED:
                            errorMessage = '請求被拒絕';
                            break;
                        case google.maps.DirectionsStatus.UNKNOWN_ERROR:
                            errorMessage = '未知錯誤，請稍後再試';
                            break;
                        default:
                            errorMessage = `路線規劃失敗 (${status})`;
                    }
                    
                    showToast(errorMessage);
                }
            });
        }

        window.closeRoutePanel = function() {
            document.getElementById('routeSummary').classList.remove('show');
            if (directionsRenderer) directionsRenderer.setDirections({ routes: [] });
            
            isRouteCollapsed = false;
            const routeArrow = document.getElementById('routeArrow');
            routeArrow.classList.remove('up');
            routeArrow.innerHTML = '▼';
        };

        function showMeetingLocationFromStorage() {
            try {
                const savedLocation = localStorage.getItem('meetingLocation');
                if (savedLocation && map) {
                    const locationData = JSON.parse(savedLocation);
                    const now = new Date().getTime();
                    
                    if (now - locationData.timestamp < 5 * 60 * 1000) {
                        const position = {
                            lat: locationData.lat,
                            lng: locationData.lng
                        };
                        
                        map.setCenter(position);
                        map.setZoom(17);
                        
                        if (meetingLocationMarker) meetingLocationMarker.setMap(null);
                        
                        meetingLocationMarker = new google.maps.Marker({
                            map: map,
                            position: position,
                            title: '會合點',
                            icon: {
                                path: google.maps.SymbolPath.CIRCLE,
                                scale: 12,
                                fillColor: '#FF4444',
                                fillOpacity: 1,
                                strokeColor: 'white',
                                strokeWeight: 3
                            }
                        });
                        
                        if (meetingInfoWindow) meetingInfoWindow.close();
                        
                        meetingInfoWindow = new google.maps.InfoWindow({
                            content: `
                                <div class="meeting-info-window">
                                    <div class="meeting-info-title">🎯 會合點</div>
                                    <div class="meeting-info-address">📍 ${locationData.address || '未知地址'}</div>
                                </div>
                            `
                        });
                        
                        setTimeout(() => meetingInfoWindow.open(map, meetingLocationMarker), 500);
                        localStorage.removeItem('meetingLocation');
                    } else {
                        localStorage.removeItem('meetingLocation');
                    }
                }
            } catch (error) {
                console.error('讀取會合點資料錯誤:', error);
                localStorage.removeItem('meetingLocation');
            }
        }

        auth.onAuthStateChanged((user) => {
            if (user) {
                console.log('用戶已登入');
                if (isMapInitialized) {
                    loadUserGroups();
                }
            } else {
                console.log('用戶未登入，地圖以訪客模式顯示');
            }
        });

        window.addEventListener('beforeunload', () => {
            stopSharingLocation();
            if (unsubscribeGroupLocations) {
                unsubscribeGroupLocations();
            }
        });

        document.addEventListener('touchstart', function(e) {
        }, { passive: true });
    </script>
</body>
</html>

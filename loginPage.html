<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>TravelSync · 登入/註冊</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --accent: #2CC5C2;
            --accent-dark: #0C344E;
            --bg: #f5fbfb;
            --card: #ffffff;
            --muted: #6b7b86;
            --error: #ff5a5f;
            --success: #4caf50;
            --radius: 14px;
        }

        body {
            font-family: 'Noto Sans', 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f2fbfb 0%, #ebf8f8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            touch-action: pan-y pinch-zoom;
        }

        .auth-container {
            max-width: 450px;
            width: 100%;
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: 0 20px 40px rgba(12, 52, 78, 0.1);
            overflow: hidden;
        }

        .auth-header {
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
            color: white;
            padding: 30px;
            text-align: center;
            position: relative;
        }

        .back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .back-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .back-button:active {
            transform: scale(0.95);
        }

        .auth-header .logo {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 24px;
            font-weight: bold;
            color: var(--accent-dark);
            transition: transform 0.3s ease;
        }

        .auth-header .logo:active {
            transform: scale(0.95);
        }

        .auth-header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .auth-header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .auth-body {
            padding: 30px;
        }

        .tab-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 2px solid #eef2f2;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            font-weight: 600;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            -webkit-tap-highlight-color: transparent;
        }

        .tab:active {
            color: var(--accent);
        }

        .tab.active {
            color: var(--accent);
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--accent);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 6px;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 14px;
            border: 1px solid #e6eef0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
            background: white;
            -webkit-appearance: none;
        }

        input:focus {
            outline: none;
            border-color: var(--accent);
        }

        input:active {
            transform: scale(0.99);
        }

        .error-message {
            color: var(--error);
            font-size: 13px;
            margin-top: 5px;
            min-height: 20px;
            transition: all 0.3s ease;
        }

        .success-message {
            color: var(--success);
            font-size: 13px;
            margin-top: 5px;
            min-height: 20px;
        }

        .forgot-password {
            text-align: right;
            margin-top: 8px;
            margin-bottom: 5px;
        }

        .forgot-password a {
            color: var(--accent);
            font-size: 13px;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .forgot-password a:hover {
            text-decoration: underline;
            color: var(--accent-dark);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:hover {
            background: #28b5b2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(44, 197, 194, 0.3);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn.secondary {
            background: white;
            border: 1px solid var(--accent);
            color: var(--accent);
        }

        .btn.secondary:hover {
            background: #f0fcfc;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 45%;
            height: 1px;
            background: #e6eef0;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .divider span {
            background: white;
            padding: 0 10px;
            color: var(--muted);
            font-size: 13px;
        }

        .social-login {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .social-btn {
            flex: 1;
            padding: 12px;
            border: 1px solid #e6eef0;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        .social-btn:hover {
            background: #f5fbfb;
            transform: translateY(-2px);
        }

        .social-btn:active {
            transform: scale(0.98);
        }

        .social-btn svg {
            width: 20px;
            height: 20px;
        }

        .terms {
            font-size: 12px;
            color: var(--muted);
            text-align: center;
            margin-top: 20px;
        }

        .terms a {
            color: var(--accent);
            text-decoration: none;
        }

        .terms a:hover {
            text-decoration: underline;
        }

        .terms a:active {
            opacity: 0.8;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 忘記密碼浮層 */
        .forgot-password-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        .forgot-password-modal {
            background: white;
            border-radius: 24px;
            padding: 30px;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: slideUp 0.4s ease;
        }

        .forgot-password-modal h3 {
            color: var(--accent-dark);
            font-size: 24px;
            margin-bottom: 10px;
            text-align: center;
        }

        .forgot-password-modal p {
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 20px;
            text-align: center;
            line-height: 1.6;
        }

        .forgot-password-modal .form-group {
            margin-bottom: 20px;
        }

        .forgot-password-modal .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .forgot-password-modal .modal-actions button {
            flex: 1;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--accent-dark);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 14px;
            z-index: 10000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            animation: slideUp 0.3s ease;
        }

        /* 手機版優化 */
        @media (max-width: 768px) {
            body {
                padding: 10px;
                align-items: flex-start;
                min-height: 100vh;
                padding-top: 20px;
                padding-bottom: 20px;
            }

            .auth-header {
                padding: 25px 20px;
            }

            .back-button {
                top: 15px;
                left: 15px;
                width: 36px;
                height: 36px;
                font-size: 20px;
            }

            .auth-header .logo {
                width: 60px;
                height: 60px;
                font-size: 22px;
            }

            .auth-header h1 {
                font-size: 22px;
            }

            .auth-header p {
                font-size: 13px;
            }

            .auth-body {
                padding: 20px;
            }

            .tab {
                padding: 10px;
                font-size: 15px;
            }

            .form-group {
                margin-bottom: 15px;
            }

            label {
                font-size: 12px;
                margin-bottom: 4px;
            }

            input {
                padding: 12px;
                font-size: 14px;
            }

            .btn {
                padding: 12px;
                font-size: 15px;
            }

            .error-message {
                font-size: 12px;
            }

            .forgot-password a {
                font-size: 12px;
            }

            .divider span {
                font-size: 12px;
            }

            .social-btn {
                padding: 10px;
                font-size: 13px;
            }

            .social-btn svg {
                width: 18px;
                height: 18px;
            }

            .terms {
                font-size: 11px;
                margin-top: 15px;
            }

            .loading p {
                font-size: 13px;
            }

            .forgot-password-modal {
                padding: 25px;
            }

            .forgot-password-modal h3 {
                font-size: 20px;
            }

            .forgot-password-modal p {
                font-size: 13px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 5px;
            }

            .auth-header {
                padding: 20px 15px;
            }

            .back-button {
                top: 12px;
                left: 12px;
                width: 32px;
                height: 32px;
                font-size: 18px;
            }

            .auth-header .logo {
                width: 50px;
                height: 50px;
                font-size: 20px;
                border-radius: 15px;
                margin-bottom: 10px;
            }

            .auth-header h1 {
                font-size: 20px;
            }

            .auth-header p {
                font-size: 12px;
            }

            .auth-body {
                padding: 15px;
            }

            .tab-bar {
                margin-bottom: 20px;
                gap: 5px;
            }

            .tab {
                padding: 8px;
                font-size: 14px;
            }

            .form-group {
                margin-bottom: 12px;
            }

            input {
                padding: 10px;
                font-size: 13px;
            }

            .btn {
                padding: 10px;
                font-size: 14px;
            }

            .social-login {
                flex-direction: column;
                gap: 8px;
            }

            .social-btn {
                padding: 10px;
                font-size: 14px;
            }

            .divider {
                margin: 15px 0;
            }

            .terms {
                font-size: 10px;
            }

            .loading {
                padding: 15px;
            }

            .forgot-password-modal {
                padding: 20px;
            }

            .forgot-password-modal h3 {
                font-size: 18px;
            }

            .forgot-password-modal .modal-actions {
                flex-direction: column;
            }
        }

        @media (max-width: 375px) {
            .auth-header {
                padding: 15px;
            }

            .back-button {
                top: 10px;
                left: 10px;
                width: 30px;
                height: 30px;
                font-size: 16px;
            }

            .auth-header .logo {
                width: 45px;
                height: 45px;
                font-size: 18px;
            }

            .auth-header h1 {
                font-size: 18px;
            }

            .auth-body {
                padding: 12px;
            }

            .tab {
                font-size: 13px;
                padding: 6px;
            }

            input {
                padding: 8px;
                font-size: 12px;
            }

            .btn {
                padding: 8px;
                font-size: 13px;
            }

            .social-btn {
                padding: 8px;
                font-size: 13px;
            }

            .social-btn svg {
                width: 16px;
                height: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- 忘記密碼浮層 -->
    <div class="forgot-password-overlay" id="forgotPasswordOverlay">
        <div class="forgot-password-modal">
            <h3>🔐 重設密碼</h3>
            <p>請輸入您的電子郵件，我們將發送密碼重設連結給您</p>
            <div class="form-group">
                <label for="resetEmail">電子郵件</label>
                <input type="email" id="resetEmail" placeholder="example@email.com" inputmode="email">
                <div class="error-message" id="resetEmailError"></div>
                <div class="success-message" id="resetSuccessMessage"></div>
            </div>
            <div class="modal-actions">
                <button class="btn secondary" onclick="closeForgotPassword()">取消</button>
                <button class="btn" onclick="sendPasswordReset()">發送重設連結</button>
            </div>
        </div>
    </div>

    <div class="auth-container">
        <div class="auth-header">
            <button class="back-button" onclick="goBack()" title="返回首頁">←</button>
            <div class="logo">TS</div>
            <h1>TravelSync</h1>
            <p>Plan · Sync · Explore</p>
        </div>

        <div class="auth-body">
            <!-- 頁籤切換 -->
            <div class="tab-bar">
                <div class="tab active" onclick="switchTab('login')" id="loginTab">登入</div>
                <div class="tab" onclick="switchTab('register')" id="registerTab">註冊</div>
            </div>

            <!-- 登入表單 -->
            <div id="loginForm">
                <div class="form-group">
                    <label>電子郵件</label>
                    <input type="email" id="loginEmail" placeholder="example@email.com" inputmode="email">
                    <div class="error-message" id="loginEmailError"></div>
                </div>

                <div class="form-group">
                    <label>密碼</label>
                    <input type="password" id="loginPassword" placeholder="••••••••">
                    <div class="error-message" id="loginPasswordError"></div>
                </div>

                <div class="forgot-password">
                    <a onclick="openForgotPassword()">忘記密碼？</a>
                </div>

                <div class="error-message" id="loginGeneralError"></div>

                <button class="btn" onclick="handleLogin()">登入</button>
                
                <div id="loginError" style="color: #ff5a5f; font-size: 13px; margin-top: 10px; text-align: center;"></div>

                <div class="divider">
                    <span>或使用</span>
                </div>

                <div class="social-login">
                    <button class="social-btn" onclick="googleLogin()">
                        <svg width="20" height="20" viewBox="0 0 24 24">
                            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                        </svg>
                        Google
                    </button>
                </div>
            </div>

            <!-- 註冊表單 -->
            <div id="registerForm" style="display: none;">
                <div class="form-group">
                    <label>姓名</label>
                    <input type="text" id="registerName" placeholder="王小明" inputmode="text">
                    <div class="error-message" id="registerNameError"></div>
                </div>

                <div class="form-group">
                    <label>電子郵件</label>
                    <input type="email" 
                           id="registerEmail" 
                           placeholder="example@email.com" 
                           inputmode="email"
                           oninput="checkEmailAvailability(this.value)">
                    <div class="error-message" id="registerEmailError"></div>
                </div>

                <div class="form-group">
                    <label>密碼</label>
                    <input type="password" id="registerPassword" placeholder="至少6位數">
                    <div class="error-message" id="registerPasswordError"></div>
                </div>

                <div class="form-group">
                    <label>確認密碼</label>
                    <input type="password" id="registerConfirmPassword" placeholder="再次輸入密碼">
                    <div class="error-message" id="registerConfirmError"></div>
                </div>

                <div class="error-message" id="registerGeneralError"></div>

                <button class="btn" onclick="handleRegister()" id="registerBtn" disabled>註冊</button>

                <div class="terms">
                    註冊即表示您同意我們的 <a href="#">服務條款</a> 和 <a href="#">隱私政策</a>
                </div>
            </div>

            <!-- 載入中動畫 -->
            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p style="margin-top: 10px; color: var(--muted);">處理中...</p>
            </div>
        </div>
    </div>

    <script>
        // ===== Firebase 配置 =====
        const firebaseConfig = {
            apiKey: "AIzaSyCIwmeMV5XHSEPlneNN9vlRsI7feaoQm18",
            authDomain: "project-221c4.firebaseapp.com",
            projectId: "project-221c4",
            storageBucket: "project-221c4.firebasestorage.app",
            messagingSenderId: "525623699486",
            appId: "1:525623699486:web:20452f93c6dc3901aa260f"
        };

        // 初始化 Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // 啟用持久化
        auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL)
            .then(() => console.log('✅ 已啟用本地持久化'))
            .catch(error => console.error('❌ 設定持久化錯誤:', error));

        // ===== 控制變數 =====
        let isRedirecting = false;
        let registrationInProgress = false;
        let emailCheckTimeout;

        // ===== 返回首頁 =====
        function goBack() {
            window.location.href = 'index.html';
        }

        // ===== 顯示提示訊息 =====
        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'toast-message';
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'slideUp 0.3s ease reverse';
                setTimeout(() => {
                    if (document.body.contains(toast)) {
                        document.body.removeChild(toast);
                    }
                }, 300);
            }, 2000);
        }

        // ===== 開啟忘記密碼浮層 =====
        function openForgotPassword() {
            document.getElementById('forgotPasswordOverlay').style.display = 'flex';
            document.getElementById('resetEmail').value = '';
            document.getElementById('resetEmailError').textContent = '';
            document.getElementById('resetSuccessMessage').innerHTML = '';
        }

        // ===== 關閉忘記密碼浮層 =====
        function closeForgotPassword() {
            document.getElementById('forgotPasswordOverlay').style.display = 'none';
        }

        // ===== 發送密碼重設郵件 =====
        async function sendPasswordReset() {
            const email = document.getElementById('resetEmail').value.trim();
            const errorEl = document.getElementById('resetEmailError');
            const successEl = document.getElementById('resetSuccessMessage');
            
            errorEl.textContent = '';
            successEl.innerHTML = '';

            if (!email) {
                errorEl.textContent = '請輸入電子郵件';
                return;
            }

            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPattern.test(email)) {
                errorEl.textContent = '電子郵件格式不正確';
                return;
            }

            const sendBtn = document.querySelector('.forgot-password-modal .btn:last-child');
            sendBtn.disabled = true;
            sendBtn.textContent = '發送中...';

            try {
                await auth.sendPasswordResetEmail(email);
                
                const firebaseSenderEmail = 'noreply@project-221c4.firebaseapp.com';
                
                successEl.innerHTML = `
                    <div style="background: #e8f5e9; padding: 16px; border-radius: 12px; border-left: 4px solid #4caf50;">
                        <div style="font-weight: 700; color: #2e7d32; font-size: 16px; margin-bottom: 12px;">
                            ✅ 重設密碼郵件已發送

            } catch (error) {
                console.error('發送重設密碼錯誤:', error);
                
                let errorMessage = '';
                switch (error.code) {
                    case 'auth/user-not-found':
                        errorMessage = '此電子郵件尚未註冊';
                        break;
                    case 'auth/invalid-email':
                        errorMessage = '電子郵件格式不正確';
                        break;
                    case 'auth/too-many-requests':
                        errorMessage = '請求次數過多，請稍後再試';
                        break;
                    default:
                        errorMessage = '發送失敗：' + error.message;
                }
                
                errorEl.innerHTML = `
                    <div style="background: #ffebee; padding: 12px; border-radius: 8px; border-left: 4px solid #f44336;">

                            <span>${errorMessage}</span>

                    </div>
                `;
                
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = '發送重設連結';
            }
        }

        // ===== 切換頁籤 =====
// ===== 切換頁籤 =====
// ===== 切換頁籤 =====
function switchTab(tab) {
    const loginTab = document.getElementById('loginTab');
    const registerTab = document.getElementById('registerTab');
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const registerBtn = document.getElementById('registerBtn');
    const emailInput = document.getElementById('registerEmail');
    const emailError = document.getElementById('registerEmailError');

    if (tab === 'login') {
        loginTab.classList.add('active');
        registerTab.classList.remove('active');
        loginForm.style.display = 'block';
        registerForm.style.display = 'none';
    } else {
        registerTab.classList.add('active');
        loginTab.classList.remove('active');
        registerForm.style.display = 'block';
        loginForm.style.display = 'none';
        
        // 重置所有狀態
        if (emailInput) {
            emailInput.value = '';
            if (emailInput.dataset) {
                emailInput.dataset.emailAvailable = 'false';
                delete emailInput.dataset.lastChecked;
            }
        }
        if (emailError) {
            emailError.textContent = '';
            emailError.style.color = '';
        }
        if (registerBtn) {
            registerBtn.disabled = true;
        }
        
        // 清除任何等待中的檢查
        if (emailCheckTimeout) {
            clearTimeout(emailCheckTimeout);
        }
    }
}

        // ===== 顯示錯誤訊息 =====
        function showError(elementId, message) {
            const element = document.getElementById(elementId);
            if (element) {
                element.textContent = message;
            }
        }

        // ===== 清除錯誤訊息 =====
        function clearErrors() {
            const errorElements = document.querySelectorAll('.error-message');
            errorElements.forEach(el => el.textContent = '');
        }

        // ===== 顯示/隱藏載入中 =====
        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
            const btns = document.querySelectorAll('.btn');
            btns.forEach(btn => btn.disabled = show);
        }

        // ===== 即時檢查 Email 是否可用 =====
// ===== 修正版 Email 檢查（使用 fetchSignInMethodsForEmail） =====
// ===== 直接查詢 Firestore 檢查 Email 是否已被使用 =====
window.checkEmailAvailability = async function(email) {
    const emailError = document.getElementById('registerEmailError');
    const registerBtn = document.getElementById('registerBtn');
    const emailInput = document.getElementById('registerEmail');
    
    if (emailCheckTimeout) {
        clearTimeout(emailCheckTimeout);
    }
    
    if (!email) {
        if (emailError) emailError.textContent = '';
        if (registerBtn) registerBtn.disabled = true;
        return;
    }
    
    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailPattern.test(email)) {
        if (emailError) {
            emailError.textContent = '電子郵件格式不正確';
            emailError.style.color = '#ff5a5f';
        }
        if (registerBtn) registerBtn.disabled = true;
        return;
    }
    
    if (emailError) {
        emailError.textContent = '⏳ 檢查中...';
        emailError.style.color = '#6B7B86';
    }
    if (registerBtn) registerBtn.disabled = true;
    
    emailCheckTimeout = setTimeout(async () => {
        try {
            // 🔥 直接查詢 Firestore 的 users 集合，找出是否有這個 email
            const querySnapshot = await db.collection('users')
                .where('email', '==', email)
                .limit(1)
                .get();
            
            console.log('Firestore 查詢結果:', querySnapshot.empty ? '無此 Email' : 'Email 已存在');
            
            if (!querySnapshot.empty) {
                // Email 已被註冊
                if (emailError) {
                    emailError.innerHTML = '❌ 此電子郵件已被註冊 <span style="font-size: 12px; display: block; margin-top: 4px;">👉 點擊上方「登入」頁籤直接登入</span>';
                    emailError.style.color = '#ff5a5f';
                }
                if (registerBtn) registerBtn.disabled = true;
                if (emailInput) emailInput.dataset.emailAvailable = 'false';
            } else {
                // Email 可用
                if (emailError) {
                    emailError.innerHTML = '✅ 此電子郵件可以使用';
                    emailError.style.color = '#4caf50';
                }
                if (registerBtn) registerBtn.disabled = false;
                if (emailInput) {
                    emailInput.dataset.emailAvailable = 'true';
                    emailInput.dataset.lastChecked = Date.now();
                }
            }
        } catch (error) {
            console.error('檢查 Email 錯誤:', error);
            
            // 處理特定錯誤
            if (error.code === 'permission-denied') {
                if (emailError) {
                    emailError.innerHTML = '⚠️ 無法檢查，請稍後再試';
                    emailError.style.color = '#ff5a5f';
                }
            } else if (error.code === 'unavailable') {
                if (emailError) {
                    emailError.innerHTML = '⚠️ 服務暫時無法使用，請稍後再試';
                    emailError.style.color = '#ff5a5f';
                }
            } else {
                if (emailError) {
                    emailError.innerHTML = '⚠️ 檢查失敗，請稍後再試';
                    emailError.style.color = '#ff5a5f';
                }
            }
            
            if (registerBtn) registerBtn.disabled = true;
            if (emailInput) emailInput.dataset.emailAvailable = 'false';
        }
    }, 800);
};
        // ===== 處理登入 =====
        async function handleLogin() {
            clearErrors();
            
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            
            if (!email || !password) {
                document.getElementById('loginError').textContent = '請輸入電子郵件與密碼';
                return;
            }

            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPattern.test(email)) {
                document.getElementById('loginError').textContent = '電子郵件格式不正確';
                return;
            }

            showLoading(true);
            document.getElementById('loginError').textContent = '';

            try {
                const userCredential = await auth.signInWithEmailAndPassword(email, password);
                const user = userCredential.user;
                
                console.log('✅ 登入成功:', user.uid);
                
                localStorage.setItem('userId', user.uid);
                localStorage.setItem('userEmail', user.email);
                localStorage.setItem('userName', user.displayName || '');
                
                showToast('✅ 登入成功！');
                
                setTimeout(() => {
                    if (!isRedirecting) {
                        isRedirecting = true;
                        window.location.href = 'index.html';
                    }
                }, 500);
                
            } catch (error) {
                console.error('❌ 登入錯誤:', error);
                
                let errorMessage = '登入失敗';
                
                switch (error.code) {
                    case 'auth/invalid-email':
                        errorMessage = '電子郵件格式不正確';
                        break;
                    case 'auth/user-disabled':
                        errorMessage = '此帳號已被停用';
                        break;
                    case 'auth/user-not-found':
                        errorMessage = '找不到此帳號，請確認電子郵件是否正確';
                        break;
                    case 'auth/wrong-password':
                        errorMessage = '密碼錯誤，請重新輸入';
                        break;
                    case 'auth/invalid-login-credentials':
                        errorMessage = '電子郵件或密碼錯誤，請重新輸入';
                        break;
                    case 'auth/too-many-requests':
                        errorMessage = '嘗試次數過多，請稍後再試';
                        break;
                    case 'auth/network-request-failed':
                        errorMessage = '網路連線失敗，請檢查網路設定';
                        break;
                    default:
                        errorMessage = error.message || '登入失敗，請稍後再試';
                }
                
                document.getElementById('loginError').textContent = errorMessage;
                showLoading(false);
            }
        }

        // ===== 處理註冊 =====
// ===== 處理註冊（加強版） =====
// ===== 處理註冊（最終版） =====
// ===== 處理註冊 =====
// ===== 處理註冊 =====
async function handleRegister() {
    clearErrors();

    const nameInput = document.getElementById('registerName');
    const emailInput = document.getElementById('registerEmail');
    const passwordInput = document.getElementById('registerPassword');
    const confirmInput = document.getElementById('registerConfirmPassword');
    const registerBtn = document.getElementById('registerBtn');
    
    const name = nameInput ? nameInput.value.trim() : '';
    const email = emailInput ? emailInput.value.trim() : '';
    const password = passwordInput ? passwordInput.value.trim() : '';
    const confirmPassword = confirmInput ? confirmInput.value.trim() : '';

    if (!name) {
        showError('registerNameError', '請輸入姓名');
        return;
    }
    if (!email) {
        showError('registerEmailError', '請輸入電子郵件');
        return;
    }
    if (!password) {
        showError('registerPasswordError', '請輸入密碼');
        return;
    }
    if (password.length < 6) {
        showError('registerPasswordError', '密碼至少需要6位數');
        return;
    }
    if (password !== confirmPassword) {
        showError('registerConfirmError', '兩次輸入的密碼不一致');
        return;
    }

    const emailError = document.getElementById('registerEmailError');
    const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailPattern.test(email)) {
        showError('registerEmailError', '電子郵件格式不正確');
        return;
    }

    // 檢查註冊按鈕狀態
    if (registerBtn.disabled) {
        if (emailError) {
            emailError.innerHTML = '❌ 請等待 Email 檢查完成';
            emailError.style.color = '#ff5a5f';
        }
        return;
    }

    // 🔥 註冊前最後一次確認
    if (emailError) {
        emailError.innerHTML = '⏳ 最終確認中...';
        emailError.style.color = '#6B7B86';
    }
    if (registerBtn) registerBtn.disabled = true;

    try {
        // 最後一次查詢 Firestore 確認 Email 未被使用
        const querySnapshot = await db.collection('users')
            .where('email', '==', email)
            .limit(1)
            .get();
        
        if (!querySnapshot.empty) {
            if (emailError) {
                emailError.innerHTML = '❌ 此電子郵件已被註冊，請點擊上方「登入」';
                emailError.style.color = '#ff5a5f';
            }
            if (registerBtn) registerBtn.disabled = true;
            return;
        }

        // 開始註冊流程
        if (emailError) {
            emailError.innerHTML = '✅ 確認完成，正在註冊...';
            emailError.style.color = '#4caf50';
        }

        registrationInProgress = true;
        showLoading(true);

        const userCredential = await auth.createUserWithEmailAndPassword(email, password);
        const user = userCredential.user;

        await user.updateProfile({
            displayName: name
        });

        await user.reload();

        const userData = {
            username: name,
            email: email,
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
            profileImageUrl: null,
            groups: {}
        };

        await db.collection('users').doc(user.uid).set(userData);

        localStorage.setItem('userId', user.uid);
        localStorage.setItem('userEmail', user.email);
        localStorage.setItem('userName', name);

        showToast('✅ 註冊成功！');

        registrationInProgress = false;
        
        setTimeout(() => {
            if (!isRedirecting) {
                isRedirecting = true;
                window.location.href = 'index.html';
            }
        }, 500);

    } catch (error) {
        console.error('❌ 註冊錯誤:', error);
        
        let errorMessage = '註冊失敗';
        
        if (error.code === 'auth/email-already-in-use') {
            errorMessage = '此電子郵件已被註冊，請使用其他郵件或直接登入';
            if (emailError) {
                emailError.innerHTML = '❌ 此電子郵件已被註冊';
                emailError.style.color = '#ff5a5f';
            }
            if (registerBtn) registerBtn.disabled = true;
        } else if (error.code === 'auth/invalid-email') {
            errorMessage = '電子郵件格式不正確';
        } else if (error.code === 'auth/weak-password') {
            errorMessage = '密碼強度不足，請使用至少6位數的密碼';
        } else if (error.code === 'auth/network-request-failed') {
            errorMessage = '網路連線失敗，請檢查網路設定';
        } else {
            errorMessage = error.message || '註冊失敗，請稍後再試';
        }
        
        showError('registerGeneralError', errorMessage);
        showLoading(false);
        registrationInProgress = false;
    }
}
        // ===== Google 登入 =====
        async function googleLogin() {
            const provider = new firebase.auth.GoogleAuthProvider();
            
            try {
                showLoading(true);
                const result = await auth.signInWithPopup(provider);
                const user = result.user;

                const userDoc = await db.collection('users').doc(user.uid).get();
                
                if (!userDoc.exists) {
                    const userName = user.displayName || 'Google 用戶';
                    
                    await db.collection('users').doc(user.uid).set({
                        username: userName,
                        email: user.email,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        currentGroupId: null,
                        profileImageUrl: user.photoURL || null,
                        groups: {}
                    });
                }

                localStorage.setItem('userId', user.uid);
                localStorage.setItem('userEmail', user.email);
                localStorage.setItem('userName', user.displayName || '');

                showToast('✅ Google 登入成功！');

                setTimeout(() => {
                    if (!isRedirecting) {
                        isRedirecting = true;
                        window.location.href = 'index.html';
                    }
                }, 500);
                
            } catch (error) {
                console.error('Google 登入錯誤:', error);
                document.getElementById('loginError').textContent = 'Google 登入失敗：' + error.message;
                showLoading(false);
            }
        }

        // ===== 監聽認證狀態 =====
        auth.onAuthStateChanged((user) => {
            console.log('onAuthStateChanged 觸發:', user ? `用戶已登入: ${user.uid}` : '用戶未登入');
            
            // 檢查 URL 參數，如果有 stay=true 就不跳轉
            const urlParams = new URLSearchParams(window.location.search);
            const stayOnPage = urlParams.get('stay') === 'true';
            
            if (stayOnPage) {
                console.log('🔧 強制停留在登入頁面（除錯模式）');
                return;
            }
            
            if (registrationInProgress) {
                console.log('註冊流程進行中，跳過自動跳轉');
                return;
            }
            
            if (user && !isRedirecting && window.location.pathname.includes('loginPage.html')) {
                console.log('準備跳轉到 index.html');
                isRedirecting = true;
                
                localStorage.setItem('userId', user.uid);
                localStorage.setItem('userEmail', user.email);
                localStorage.setItem('userName', user.displayName || '');
                
                window.location.href = 'index.html';
            }
        });

        // ===== 監聽 Enter 鍵 =====
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const activeTab = document.querySelector('.tab.active').textContent;
                if (activeTab === '登入') {
                    handleLogin();
                } else {
                    handleRegister();
                }
            }
        });

        // ===== 點擊浮層背景關閉 =====
        document.getElementById('forgotPasswordOverlay')?.addEventListener('click', function(e) {
            if (e.target === this) {
                closeForgotPassword();
            }
        });

        // ===== 優化觸控體驗 =====
        document.addEventListener('touchstart', function(e) {
        }, { passive: true });
    </script>
